function countNodes(arr) { let n=0; arr.forEach(x=>{n++;if(x.children)n+=countNodes(x.children);}); return n; }

function Tag({t}) {
  if(!t) return null;
  return h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',padding:'2px 7px',borderRadius:4,border:`1px solid ${t.border}`,background:t.bg,color:t.color,flexShrink:0,whiteSpace:'nowrap'}},t.label);
}

function HBadge({hx}) {
  return h('span',{style:{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:3,background:'#E3F4F1',color:'#1A7A6E',border:'1px solid #96CECC',whiteSpace:'nowrap'}},hx);
}

function Node({node,depth}) {
  const hasKids = node.children && node.children.length > 0;
  const [open,setOpen] = useState(depth < 2);
  const fz = depth===0?15:depth===1?13:depth===2?12:11;
  const fw = depth===0?700:depth===1?600:depth===2?500:400;
  const col = node.color||'#4A5568';
  const bg = node.bg||'#F7F8FA';
  const pad = depth===0?14:depth===1?10:depth===2?8:6;

  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'flex-start'}},
      Array.from({length:depth}).map((_,i)=>h('div',{key:i,style:{width:20,flexShrink:0,borderLeft:'1.5px solid #E2E8F0',minHeight:28,marginTop:-4}})),
      depth>0&&h('div',{style:{width:12,height:1.5,background:'#E2E8F0',marginTop:18,flexShrink:0}}),
      h('div',{style:{flex:1,minWidth:0,marginBottom:5}},
        h('div',{
          onClick:()=>hasKids&&setOpen(o=>!o),
          style:{background:bg,border:`1px solid ${depth<=1?col+'60':'#E2E8F0'}`,borderLeft:`${depth<=1?3:1.5}px solid ${depth<=1?col:'#E2E8F0'}`,borderRadius:7,padding:`${pad}px 12px`,cursor:hasKids?'pointer':'default'}
        },
          h('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
            hasKids&&h('span',{style:{width:18,height:18,borderRadius:4,background:col+'22',border:`1px solid ${col}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:col,fontWeight:700,flexShrink:0}},open?'−':'+'),
            !hasKids&&h('span',{style:{width:7,height:7,borderRadius:'50%',background:col+'60',flexShrink:0,marginLeft:2}}),
            h('span',{style:{fontSize:fz,fontWeight:fw,color:depth<=1?col:'#1A2035',lineHeight:1.3}},node.label),
            node.tag&&h(Tag,{t:node.tag}),
            ...(node.fixes||[]).map(hx=>h(HBadge,{key:hx,hx})),
            h('span',{style:{marginLeft:'auto',fontSize:10,color:'#94A3B8',fontFamily:'monospace',background:'#F1F5F9',padding:'1px 6px',borderRadius:3,flexShrink:0,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},node.url),
            hasKids&&h('span',{style:{fontSize:10,color:'#94A3B8',flexShrink:0}},node.children.length+' '+(node.children.length===1?'page':'pages'))
          ),
          node.desc&&h('div',{style:{fontSize:11,color:'#64748B',marginTop:4,paddingLeft:hasKids?24:16,lineHeight:1.45}},node.desc)
        ),
        hasKids&&open&&h('div',{style:{marginLeft:8}},node.children.map(c=>h(Node,{key:c.id,node:c,depth:depth+1})))
      )
    )
  );
}

        h('button',{onClick:()=>setExpandAll(Date.now()+'c'),style:{fontSize:11,padding:'5px 12px',borderRadius:5,border:'1px solid #E2E8F0',background:'#fff',cursor:'pointer',color:'#0B1F3A'}},'Collapse')
